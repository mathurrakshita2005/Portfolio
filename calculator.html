<html>
   <head>
     <title>Calculator</title>

     <style>
         body {
              font-family: sans-serif;
              display: flex;
              justify-content: center;
              align-items: center;
              height: 100vh;
              background-color: #f2f2f2;
            }
            .calculator {
                border: 1px solid #ccc;
                padding: 20px;
                background: white;
                border-radius: 10px;
                box-shadow: 2px 2px 10px #aaa; 
            }
            #display {
              width: 100%;
              padding: 10px;
              font-size: 20px;
               margin-bottom: 10px;
               text-align: right;
            }

            .buttons {
               display: grid;
               grid-template-columns: repeat(4, 60px);
               gap: 10px;
            }

            button { 
              padding: 15px;
              font-size: 18px;
              cursor: pointer;
              border: none;
              background-color: #ddd;
              border-radius: 5px;
              transition: background-color 0.2s;
            }

            button.active {
               background-color: orange;
               color: white;
              
            }

            button:hover {
               background-color: #b7b7b7;
            }

         /* Always orange for operator buttons */
           .operator {
              background-color: orange;
              color: white;
            }
     </style>
 </head>

 <script>
      function appendValue(value) {
          document.getElementById("display").value += value;
        }

       function clearDisplay() {
          document.getElementById("display").value = "";
        }

        function calculate() {
           try {
               let result = eval(document.getElementById("display").value);
               document.getElementById("display").value = result;
            } catch {
                alert("Invalid Expression");
            }
        }

       function backspace() {
          let display = document.getElementById("display");
          display.value = display.value.slice(0, -1);
        }

        function flashEffect(buttonId) {
          const btn = document.getElementById(buttonId);
          btn.classList.add("active");
          setTimeout(() => {
               btn.classList.remove("active");
            }, 200); // 200 milliseconds
        }

       


   </script>



  <body>
      <div class="calculator">
          <input type="text" id="display" disabled />
           <div class="buttons">
               <button onclick="clearDisplay()">Ac</button>
               <button id="btn1" onclick="flashEffect('btn1'),backspace();">C</button>
               <button onclick="appendValue('%')"class="operator" >%</button>
               <button onclick="appendValue('/')" class="operator">/</button>
    
               <button onclick="appendValue('7')">7</button>
               <button onclick="appendValue('8')">8</button>
               <button onclick="appendValue('9')">9</button>
               <button onclick="appendValue('*')" class="operator">X</button>
    
               <button onclick="appendValue('4')">4</button>
               <button onclick="appendValue('5')">5</button>
               <button onclick="appendValue('6')">6</button>
               <button onclick="appendValue('-')" class="operator">-</button>
    
               <button onclick="appendValue('1')">1</button>
               <button onclick="appendValue('2')">2</button>
               <button onclick="appendValue('3')">3</button>
               <button onclick="appendValue('+')" class="operator">+</button>
          
               <button onclick="appendValue('')"></button>
               <button onclick="appendValue('0')">0</button>
               <button onclick="appendValue('.')">.</button>
                <button id="btn2" onclick="flashEffect('btn2'); calculate();">=</button>
           </div>
      </div>
    
    </body>
</html>
